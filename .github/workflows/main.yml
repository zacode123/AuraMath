name: Build APK

on:
  push:
    branches:
      - main

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: 17

      - uses: android-actions/setup-android@v3

      - uses: gradle/actions/setup-gradle@v4

      - name: Create .env
        run: |
          echo "GEMINI_API_KEY=${{ secrets.GEMINI_API_KEY }}" > .env

      - name: Generate random signing credentials
        run: |
          echo "STORE_PASS=$(openssl rand -hex 32)" >> $GITHUB_ENV
          echo "KEY_PASS=$(openssl rand -hex 32)" >> $GITHUB_ENV
          echo "KEY_ALIAS=upload-$(openssl rand -hex 8)" >> $GITHUB_ENV

      - name: Generate temporary keystore
        run: |
          keytool -genkeypair \
          -v \
          -keystore my-upload-key.jks \
          -storepass "$STORE_PASS" \
          -keypass "$KEY_PASS" \
          -alias "$KEY_ALIAS" \
          -keyalg RSA \
          -keysize 4096 \
          -validity 10000 \
          -dname "CN=CI, OU=CI, O=AuraMath, L=None, ST=None, C=US"


   #   - name: Build Release APK
    #    run: gradle assembleRelease --stacktrace

      - uses: actions/upload-artifact@v4
        with:
      #    name: app-release-apk
     #     path: app/build/outputs/apk/release/app-release.apk
          name: my-upload-key.jks
          path: my-upload-key.jks
